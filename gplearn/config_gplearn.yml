seed: 42
population_size: 500
generations: 50
tournament_size: 20
stopping_criteria: 0.0
p_crossover: 0.2
p_subtree_mutation: 0.2
p_hoist_mutation: 0.1
p_point_mutation: 0.5
max_samples: 1.0
verbose: 1
parsimony_coefficient: 0.001
init_depth: [2, 6]
init_method: half and half
const_range: [-1.0, 1.0]
function_set:
  - add
  - sub
  - mul
  - protect_div
  - sin
  - cos
  - square
  - protect_sqrt
metric: mse
DATASET_PATH: benchmark_datasets
OUTPUT_PATH: results/gplearn
BENCHMARK_METADATA_PATH: benchmark_datasets/benchmark_metadata.json
